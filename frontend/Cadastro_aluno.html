<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Aluno | Sistema Presença</title>
    <link rel="stylesheet" href="assets/css/Dashboard.css">
    <link rel="stylesheet" href="assets/css/Cadastro_aluno.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <main class="container">
        <div class="form-card">
            <div class="form-header">
                <div class="icon-circle">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1>Cadastrar Aluno</h1>
                <p>Preencha os dados abaixo para registrar um novo estudante.</p>
            </div>

            <form id="studentForm" novalidate>
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input 
                        type="text" 
                        id="nome" 
                        placeholder="Ex: Ana Silva" 
                        required
                    >
                    <span class="error-message" id="error-nome">O nome é obrigatório.</span>
                </div>

                <div class="form-group">
                    <label for="email">E-mail Acadêmico</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="exemplo@universidade.com" 
                        required
                    >
                    <span class="error-message" id="error-email">Insira um e-mail válido.</span>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="window.location.href='alunos.html'">
                        Cancelar
                    </button>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i> Salvar
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="assets/js/Cadastro_aluno.js"></script>
</body>
</html>
